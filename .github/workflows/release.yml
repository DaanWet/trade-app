name: Release

# Trigger:
# - Push to `main` → reads the "version" from package.json. If no git tag
#   `v<version>` exists yet, it creates the tag, builds installers for all
#   platforms and publishes them to a GitHub Release. So cutting a release is
#   just: bump package.json version → commit → push.
# - Manual run via the Actions UI → builds installers and uploads them as
#   workflow artifacts (no GitHub Release created). Useful for smoke-testing.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to push the tag and create / upload to the Release

jobs:
  # Decide whether this push introduces a new version that needs releasing.
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.decide.outputs.version }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history so existing tags are visible

      - name: Determine version & whether to release
        id: decide
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists — nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$version — will tag and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      # Only tag on a real push (not manual smoke-test runs).
      - name: Create & push tag
        if: steps.decide.outputs.should_release == 'true' && github.event_name == 'push'
        run: |
          git tag "v${{ steps.decide.outputs.version }}"
          git push origin "v${{ steps.decide.outputs.version }}"

  build:
    needs: check
    # Build on manual runs, or on a push that bumped the version.
    if: github.event_name == 'workflow_dispatch' || needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_glob: |
              release/*.AppImage
              release/latest-linux.yml
          - os: windows-latest
            target: win
            artifact_glob: |
              release/*.exe
              release/latest.yml
          - os: macos-latest
            target: mac
            artifact_glob: |
              release/*.dmg
              release/*.zip
              release/latest-mac.yml

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      # `npm ci` at root runs the postinstall hook (electron-builder
      # install-app-deps) which rebuilds better-sqlite3 against Electron's ABI.
      - name: Install root deps (rebuilds native modules for Electron)
        run: npm ci

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build (frontend + backend + electron)
        run: npm run build

      - name: Package & publish
        # push (new version) → publish to the GitHub Release for v<version>.
        # workflow_dispatch → just build, artifacts uploaded by next step.
        run: npx electron-builder --${{ matrix.target }} --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing on macOS for unsigned dev builds.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: trade-app-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 7
