name: Release

# Trigger:
# - Push a tag starting with `v` (e.g. v0.1.0) → builds installers for all
#   platforms and publishes them to a GitHub Release matching that tag.
# - Manual run via the Actions UI → builds installers and uploads them as
#   workflow artifacts (no GitHub Release created). Useful for smoke-testing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # needed to create / upload to the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_glob: |
              release/*.AppImage
              release/latest-linux.yml
          - os: windows-latest
            target: win
            artifact_glob: |
              release/*.exe
              release/latest.yml
          - os: macos-latest
            target: mac
            artifact_glob: |
              release/*.dmg
              release/*.zip
              release/latest-mac.yml

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      # `npm ci` at root runs the postinstall hook (electron-builder
      # install-app-deps) which rebuilds better-sqlite3 against Electron's ABI.
      - name: Install root deps (rebuilds native modules for Electron)
        run: npm ci

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build (frontend + backend + electron)
        run: npm run build

      - name: Package & publish
        # On a tag push: `--publish always` uploads the artifacts to the
        # GitHub Release for that tag (creating it as a draft if absent).
        # On a manual run: `--publish never` builds locally only.
        run: npx electron-builder --${{ matrix.target }} --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing on macOS for unsigned dev builds.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: trade-app-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 7
